name: Daily Blog — Kit.com

on:
  schedule:
    # Daily at 9 AM UTC
    - cron: '0 9 * * *'

  workflow_dispatch:

# Prevent overlapping runs
concurrency:
  group: daily-blog-kit
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  blog:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        shell: bash
        run: |
          set -e

          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests
          fi

      - name: Verify generator exists
        shell: bash
        run: |
          if [ ! -f blog_generator.py ]; then
            echo "❌ blog_generator.py not found"
            exit 1
          fi

      - name: Run Blog Generator
        shell: bash
        run: |
          set -e
          python blog_generator.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: brightlane
          GH_REPO: kit

      - name: Git Status
        run: git status

      - name: Commit and Push Changes
        shell: bash
        run: |
          set +e

          git config user.name "Blog-Bot"
          git config user.email "actions@github.com"

          git add -A

          # Skip commit if nothing changed
          if git diff --cached --quiet; then
            echo "✅ No changes detected"
            exit 0
          fi

          git commit -m "Daily blog update [skip ci]"

          # Save local changes
          git stash push --include-untracked || true

          # Sync latest remote changes
          git pull --rebase origin main || true

          # Restore local work
          git stash pop || true

          git add -A

          # Amend commit if stash introduced changes
          if ! git diff --cached --quiet; then
            git commit --amend --no-edit || true
          fi

          # Push safely
          git push origin HEAD:main

          PUSH_EXIT=$?

          if [ $PUSH_EXIT -ne 0 ]; then
            echo ""
            echo "❌ Push failed"
            echo ""
            echo "Possible causes:"
            echo "- GitHub account suspended"
            echo "- Invalid token permissions"
            echo "- Branch protection rules"
            echo "- Repository access blocked"
            echo ""
            echo "Workflow completed gracefully."
            exit 0
          fi

          echo "✅ Push successful"

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
